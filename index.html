<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLUSD Supply Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #supplyChart { max-width: 800px; margin-bottom: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .slider-container { max-width: 800px; margin-bottom: 16px; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-top: 4px; }
        #windowSlider { width: 100%; accent-color: blue; cursor: pointer; }
        #windowInfo { font-size: 14px; color: #333; margin-bottom: 8px; }
        .table-wrapper { max-width: 800px; max-height: 320px; overflow-y: auto; border: 1px solid #ddd; }
        .table-wrapper table { width: 100%; border-collapse: collapse; }
        .table-wrapper thead th { position: sticky; top: 0; background-color: #f2f2f2; z-index: 1; }
        #tableInfo { font-size: 13px; color: #555; margin: 8px 0 4px; max-width: 800px; }

        /* Legend */
        .legend { display: flex; gap: 20px; font-size: 13px; margin-bottom: 8px; max-width: 800px; }
        .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

        /* Row colour coding */
        tr.increase td { color: #0a2a6e; font-weight: 600; }
        tr.decrease td { color: #c94f00; font-weight: 600; }
    </style>
</head>
<body>
    <h1>RLUSD Total Supply</h1>
    <div class="slider-container">
        <div id="windowInfo"></div>
        <input type="range" id="windowSlider" min="0" step="1" value="0">
        <div class="slider-labels">
            <span>◀ Historical</span>
            <span>Latest ▶</span>
        </div>
    </div>
    <canvas id="supplyChart"></canvas>
    <h2>Supply Change Log</h2>
    <div class="legend">
        <span><span class="legend-dot" style="background:#0a2a6e;"></span> Increase (issuance)</span>
        <span><span class="legend-dot" style="background:#c94f00;"></span> Decrease (redemption / burn)</span>
    </div>
    <div id="tableInfo"></div>
    <div class="table-wrapper">
        <table id="changeLog">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Change</th>
                    <th>Total Supply</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <script>
    const WINDOW_SIZE = 365;

    fetch('data.json')
        .then(response => response.json())
        .then(allData => {
            const slider = document.getElementById('windowSlider');
            const windowInfo = document.getElementById('windowInfo');
            const tableInfo = document.getElementById('tableInfo');
            const tableWrapper = document.querySelector('.table-wrapper');

            const maxStart = Math.max(0, allData.length - WINDOW_SIZE);
            slider.min = 0;
            slider.max = maxStart;
            slider.value = maxStart;

            const ctx = document.getElementById('supplyChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'RLUSD Total Supply', data: [], borderColor: 'blue', fill: false }] },
                options: {
                    scales: {
                        x: { title: { display: true, text: 'Date' } },
                        y: {
                            title: { display: true, text: 'Total Supply' },
                            ticks: { callback: value => value.toLocaleString() }
                        }
                    }
                }
            });

            function getWindow(startIdx) {
                return allData.slice(startIdx, startIdx + WINDOW_SIZE);
            }

            function updateChart(windowData) {
                chart.data.labels = windowData.map(d => d.date);
                chart.data.datasets[0].data = windowData.map(d => d.supply);
                chart.update();
            }

            function updateTable() {
                const logBody = document.getElementById('logBody');
                logBody.innerHTML = '';

                const fromDate = allData[0].date;
                const toDate = allData[allData.length - 1].date;
                tableInfo.textContent = `All supply changes from ${fromDate} → ${toDate} — newest at top, scroll down for older data`;

                const rows = [];
                let lastSupply = allData[0].supply;
                allData.slice(1).forEach(entry => {
                    const change = entry.supply - lastSupply;
                    if (change !== 0) {
                        rows.push({ date: entry.date, change, supply: entry.supply });
                    }
                    lastSupply = entry.supply;
                });

                // Newest first
                rows.reverse().forEach(({ date, change, supply }) => {
                    const row = document.createElement('tr');
                    const isIncrease = change > 0;
                    row.className = isIncrease ? 'increase' : 'decrease';
                    const sign = isIncrease ? '+' : '−';
                    row.innerHTML = `
                        <td>${date}</td>
                        <td>${sign}${Math.abs(change).toLocaleString()}</td>
                        <td>${supply.toLocaleString()}</td>
                    `;
                    logBody.appendChild(row);
                });

                tableWrapper.scrollTop = 0;
            }

            function updateInfo(startIdx) {
                const endIdx = Math.min(startIdx + WINDOW_SIZE - 1, allData.length - 1);
                const from = allData[startIdx].date;
                const to = allData[endIdx].date;
                const total = allData.length;
                windowInfo.textContent = `Showing ${endIdx - startIdx + 1} days: ${from} → ${to}  (${total} days total on record)`;
            }

            function render() {
                const startIdx = parseInt(slider.value);
                const windowData = getWindow(startIdx);
                updateChart(windowData);
                updateTable();
                updateInfo(startIdx);
            }

            slider.addEventListener('input', render);
            render();
        })
        .catch(error => console.error('Error loading data:', error));
    </script>
</body>
</html>
